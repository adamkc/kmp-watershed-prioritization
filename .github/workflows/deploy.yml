name: Deploy shinylive to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Opt in to Node 24 for all actions in this workflow. Silences the
# deprecation warning about actions still using Node 20; remove this
# block once all referenced actions ship Node 24-native versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Pin runtime packages to versions matching webR's repo
          # (https://repo.r-wasm.org/bin/emscripten/contrib/4.4/).
          # Without this, `any::patchwork` etc. install the latest from
          # CRAN which has been bumped to require rlang >= 1.1.7 -- but
          # webR ships rlang 1.1.6, so the bundle fails to load with
          # "namespace 'rlang' 1.1.6 is already loaded, but >= 1.1.7
          # is required". Pinning to webR's versions keeps the
          # NAMESPACE/DESCRIPTION metadata that shinylive bakes into
          # the export consistent with the binaries the browser runs.
          packages: |
            shiny@1.9.1
            bslib@0.9.0
            leaflet@2.2.2
            sf@1.0-20
            DT@0.33
            readr@2.1.5
            classInt@0.4-11
            yaml@2.3.10
            ggplot2@3.5.2
            scales@1.3.0
            markdown@2.0
            patchwork@1.3.0
            base64enc@0.1-3
            htmltools@0.5.8.1
            rlang@1.1.6
            any::shinylive

      - name: Stage runtime files outside the repo
        # shinylive::export() ultimately calls renv::dependencies() to
        # find package references. renv auto-detects the project root by
        # walking up to find a `.git` (or .Rproj / renv.lock) -- so a
        # stage dir *inside* the repo lets renv climb up and scan
        # `scripts/`, pulling in httr, terra, rmapshaper, R.utils, V8,
        # exactextractr, maps, etc. that the runtime app doesn't need
        # (and that collide on rlang in webR). Staging into /tmp is
        # outside the repo, so renv treats the stage dir itself as the
        # project root and only scans app.R + R/.
        run: |
          STAGE="$(mktemp -d)"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"
          cp app.R "$STAGE/"
          cp -r R "$STAGE/"
          cp -r data "$STAGE/"
          if [ -d www ]; then cp -r www "$STAGE/"; fi
          # Drop a sentinel so renv definitely roots here.
          touch "$STAGE/.here"
          ls -la "$STAGE"

      - name: Build shinylive bundle
        run: |
          mkdir -p _site
          Rscript -e "shinylive::export(Sys.getenv('STAGE'), '_site', verbose = TRUE)"

      - name: Set browser tab title
        # shinylive hardcodes <title>Shiny App</title> in the generated
        # index.html. Replace it with the real app title so the browser
        # tab, bookmarks, and share-link previews read correctly.
        # (An in-app tags$title() only affects the embedded iframe, not
        # the outer document the browser actually titles.)
        run: |
          sed -i 's|<title>Shiny App</title>|<title>KMP Watershed Prioritization</title>|' _site/index.html
          grep '<title>' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
