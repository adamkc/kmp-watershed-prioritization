name: Deploy shinylive to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Opt in to Node 24 for all actions in this workflow. Silences the
# deprecation warning about actions still using Node 20; remove this
# block once all referenced actions ship Node 24-native versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shiny
            any::bslib
            any::leaflet
            any::sf
            any::DT
            any::readr
            any::classInt
            any::yaml
            any::ggplot2
            any::scales
            any::markdown
            any::patchwork
            any::base64enc
            any::htmltools
            any::shinylive

      - name: Stage runtime files outside the repo
        # shinylive::export() ultimately calls renv::dependencies() to
        # find package references. renv auto-detects the project root by
        # walking up to find a `.git` (or .Rproj / renv.lock) -- so a
        # stage dir *inside* the repo lets renv climb up and scan
        # `scripts/`, pulling in httr, terra, rmapshaper, R.utils, V8,
        # exactextractr, maps, etc. that the runtime app doesn't need
        # (and that collide on rlang in webR). Staging into /tmp is
        # outside the repo, so renv treats the stage dir itself as the
        # project root and only scans app.R + R/.
        run: |
          STAGE="$(mktemp -d)"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"
          cp app.R "$STAGE/"
          cp -r R "$STAGE/"
          cp -r data "$STAGE/"
          if [ -d www ]; then cp -r www "$STAGE/"; fi
          # Drop a sentinel so renv definitely roots here.
          touch "$STAGE/.here"
          ls -la "$STAGE"

      - name: Build shinylive bundle
        # Use shinylive's default web assets (0.10.8 / webR 0.5.9 at
        # time of writing) and force a fresh export with no package
        # cache so the wasm binaries downloaded for /contrib/4.5/ match
        # the runtime version that ships with the assets bundle.
        # Earlier symptoms ("namespace 'rlang' 1.1.6 ... >= 1.1.7
        # required" then "resolved is not a function") were both
        # downstream of webR-runtime / wasm-binary ABI mismatch when we
        # tried to coerce older /contrib/4.4/ binaries or older asset
        # versions onto a newer runtime. Letting shinylive use its own
        # paired runtime + repo is the right baseline.
        run: |
          mkdir -p _site
          Rscript -e '
            shinylive::export(
              Sys.getenv("STAGE"), "_site",
              package_cache = FALSE,
              verbose = TRUE
            )
          '

      - name: Set browser tab title
        # shinylive hardcodes <title>Shiny App</title> in the generated
        # index.html. Replace it with the real app title so the browser
        # tab, bookmarks, and share-link previews read correctly.
        # (An in-app tags$title() only affects the embedded iframe, not
        # the outer document the browser actually titles.)
        run: |
          sed -i 's|<title>Shiny App</title>|<title>KMP Watershed Prioritization</title>|' _site/index.html
          grep '<title>' _site/index.html

      - name: Inject GoatCounter analytics
        # If the repo has a `GOATCOUNTER_CODE` Actions variable set
        # (Settings -> Secrets and variables -> Actions -> Variables),
        # inject a GoatCounter tracker before </head> in index.html.
        # GoatCounter is a privacy-friendly, cookie-free analytics
        # service; the snippet only fires on outer page load (it does
        # not track interactions inside the Shiny iframe).
        # If the variable is unset, this step is a no-op.
        env:
          GC_CODE: ${{ vars.GOATCOUNTER_CODE }}
        run: |
          if [ -z "$GC_CODE" ]; then
            echo "GOATCOUNTER_CODE not set -- skipping analytics injection."
            exit 0
          fi
          SNIPPET="<script data-goatcounter=\"https://${GC_CODE}.goatcounter.com/count\" async src=\"//gc.zgo.at/count.js\"></script>"
          # Use awk for safe inline replacement (no escaping headaches)
          awk -v s="$SNIPPET" '/<\/head>/{print s} {print}' _site/index.html > _site/index.html.new \
            && mv _site/index.html.new _site/index.html
          echo "GoatCounter snippet injected. Verifying:"
          grep -F "goatcounter" _site/index.html | head -3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
