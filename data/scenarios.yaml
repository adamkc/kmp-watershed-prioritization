# Scenario catalog for the KMP Watershed Prioritization Tool.
#
# Each scenario defines a named set of metrics and their starting
# weights. Metric names MUST match column names in the master data
# file (data/kmp_metrics.csv) exactly -- spaces, punctuation, and
# case all matter.
#
# Edit this file to add, remove, or tune scenarios. The app loads
# this at startup; no code changes required.
#
# NOTE: the metrics referenced below are from the *simulated*
# development dataset (20 metrics at HUC10 scale, prefixed with
# "Simulated:"). Replace with real metric names when the production
# master data is assembled.

scenarios:

  - id: kmp_general
    name: KMP General Scenario
    description: >
      Balanced prioritization across categories: fire risk/opportunity,
      climate resilience, restoration potential, biodiversity, and
      administrative readiness. A reasonable starting point when no
      single theme dominates.
    weights:
      "Simulated: Recent fire (% area, 10yr)": 1
      "Simulated: Climate resiliency index": 1
      "Simulated: Climate refugia score": 1
      "Simulated: Lost meadow potential": 2
      "Simulated: Meadow density (% area)": 1
      "Simulated: Fish of concern (# spp)": 1
      "Simulated: Rare amphibian richness": 0.5
      "Simulated: Rare plant richness": 0.5
      "Simulated: Federal ownership (%)": 1
      "Simulated: NEPA-ready area (ac)": 2

  - id: kmp_fire
    name: KMP Fire Scenario
    description: >
      Fire-focused prioritization. Elevates recent fire, unburned
      stands overdue for disturbance, and fire-return-interval
      departure, paired with administrative readiness so surfaced
      HUCs can actually be treated.
    weights:
      "Simulated: Recent fire (% area, 10yr)": 3
      "Simulated: Unburned 30yr (%)": 2
      "Simulated: Fire return departure": 2
      "Simulated: High severity fire (% area)": 1
      "Simulated: NEPA-ready area (ac)": 2
      "Simulated: Federal ownership (%)": 1
      "Simulated: Regulatory ease (0-5)": 1

  - id: kmp_climate_refuge
    name: KMP Climate Refuge Scenario
    description: >
      Climate-focused prioritization. Elevates climate resiliency and
      refugia, snow persistence, and inverse summer water stress --
      HUCs expected to remain viable habitat under warming trends.
    weights:
      "Simulated: Climate resiliency index": 3
      "Simulated: Climate refugia score": 3
      "Simulated: Snow persistence": 2
      "Simulated: Summer water stress": 1
      "Simulated: Meadow density (% area)": 1
      "Simulated: Aquatic connectivity": 1
