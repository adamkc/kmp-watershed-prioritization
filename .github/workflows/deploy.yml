name: Deploy shinylive to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Opt in to Node 24 for all actions in this workflow. Silences the
# deprecation warning about actions still using Node 20; remove this
# block once all referenced actions ship Node 24-native versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shiny
            any::bslib
            any::leaflet
            any::sf
            any::DT
            any::readr
            any::classInt
            any::yaml
            any::ggplot2
            any::scales
            any::markdown
            any::shinylive

      - name: Stage runtime files
        # Only the runtime files go to the export. shinylive::export
        # scans every .R file under appdir for library() calls and
        # bundles those packages into the WebAssembly image -- so if
        # scripts/acquire_*.R reference httr, terra, exactextractr,
        # rmapshaper, etc. (none of which the app needs), shinylive
        # tries to ship them too and the resulting dependency graph
        # collides on rlang. Staging a clean directory keeps the
        # bundle slim and the loader happy.
        run: |
          mkdir -p _stage
          cp app.R _stage/
          cp -r R _stage/
          cp -r data _stage/
          if [ -d www ]; then cp -r www _stage/; fi

      - name: Build shinylive bundle
        run: |
          mkdir -p _site
          Rscript -e 'shinylive::export("_stage", "_site", verbose = TRUE)'

      - name: Set browser tab title
        # shinylive hardcodes <title>Shiny App</title> in the generated
        # index.html. Replace it with the real app title so the browser
        # tab, bookmarks, and share-link previews read correctly.
        # (An in-app tags$title() only affects the embedded iframe, not
        # the outer document the browser actually titles.)
        run: |
          sed -i 's|<title>Shiny App</title>|<title>KMP Watershed Prioritization</title>|' _site/index.html
          grep '<title>' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
