name: Deploy shinylive to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Opt in to Node 24 for all actions in this workflow. Silences the
# deprecation warning about actions still using Node 20; remove this
# block once all referenced actions ship Node 24-native versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # rlang 1.1.7 dropped 2026-01-09. Use a Posit Package Manager
          # snapshot from before then so pkgdepends resolves to package
          # versions whose dep trees (e.g. ggplot2 3.5.2, not 4.0.x)
          # don't pull in newer-only deps like S7 that webR's
          # /contrib/4.4/ doesn't carry.
          extra-repositories: https://packagemanager.posit.co/cran/2025-09-01
          packages: |
            any::shiny
            any::bslib
            any::leaflet
            any::sf
            any::DT
            any::readr
            any::classInt
            any::yaml
            any::ggplot2
            any::scales
            any::markdown
            any::patchwork
            any::base64enc
            any::htmltools
            any::shinylive

      - name: Stage runtime files outside the repo
        # shinylive::export() ultimately calls renv::dependencies() to
        # find package references. renv auto-detects the project root by
        # walking up to find a `.git` (or .Rproj / renv.lock) -- so a
        # stage dir *inside* the repo lets renv climb up and scan
        # `scripts/`, pulling in httr, terra, rmapshaper, R.utils, V8,
        # exactextractr, maps, etc. that the runtime app doesn't need
        # (and that collide on rlang in webR). Staging into /tmp is
        # outside the repo, so renv treats the stage dir itself as the
        # project root and only scans app.R + R/.
        run: |
          STAGE="$(mktemp -d)"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"
          cp app.R "$STAGE/"
          cp -r R "$STAGE/"
          cp -r data "$STAGE/"
          if [ -d www ]; then cp -r www "$STAGE/"; fi
          # Drop a sentinel so renv definitely roots here.
          touch "$STAGE/.here"
          ls -la "$STAGE"

      - name: Build shinylive bundle
        # The webR repo at /contrib/4.5/ has been refreshed in the past
        # week with package binaries (ggplot2 4.0.3, patchwork 1.3.2,
        # bslib 0.10.0, ...) whose NAMESPACE imports require rlang
        # >= 1.1.7 -- but webR's bundled runtime still has rlang 1.1.6,
        # so the app fails to load. Pinning shinylive to /contrib/4.4/
        # via a WEBR_R_VERSION monkey-patch produced a different
        # JavaScript-level mismatch. Easiest fix: roll the bundle's web
        # assets back to 0.10.7 (Dec 2024), which predates the breaking
        # /contrib/4.5/ refresh and matches the era of consistent
        # package binaries.
        run: |
          mkdir -p _site
          Rscript -e '
            shinylive::assets_download(version = "0.10.7")
            shinylive::export(Sys.getenv("STAGE"), "_site",
                              assets_version = "0.10.7",
                              verbose = TRUE)
          '

      - name: Set browser tab title
        # shinylive hardcodes <title>Shiny App</title> in the generated
        # index.html. Replace it with the real app title so the browser
        # tab, bookmarks, and share-link previews read correctly.
        # (An in-app tags$title() only affects the embedded iframe, not
        # the outer document the browser actually titles.)
        run: |
          sed -i 's|<title>Shiny App</title>|<title>KMP Watershed Prioritization</title>|' _site/index.html
          grep '<title>' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
